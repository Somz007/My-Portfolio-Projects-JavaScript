<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Classic Snake game — eat food, grow your snake, beat your high score." />
  <title>Snake — Project 09</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <header>
      <h1>🐍 Snake</h1>
      <button id="theme-toggle" type="button" aria-label="Toggle theme">☀️</button>
    </header>

    <div class="score-row">
      <div class="score-item">
        <span class="score-label">SCORE</span>
        <span class="score-val" id="score-display">0</span>
      </div>
      <div class="score-item">
        <span class="score-label">BEST</span>
        <span class="score-val" id="high-score-display">0</span>
      </div>
    </div>

    <div class="canvas-wrap">
      <canvas id="game-canvas" aria-label="Snake game board" role="img"></canvas>
    </div>

    <p class="hint">
      <kbd>Enter</kbd> start · <kbd>WASD</kbd> / Arrows move · <kbd>Space</kbd> pause
    </p>

    <!-- mobile d-pad -->
    <div class="dpad" aria-label="Direction controls">
      <div class="dpad-row">
        <button class="dpad-btn" data-dir="ArrowUp"    type="button" aria-label="Up">▲</button>
      </div>
      <div class="dpad-row">
        <button class="dpad-btn" data-dir="ArrowLeft"  type="button" aria-label="Left">◀</button>
        <button class="dpad-btn" data-dir="ArrowDown"  type="button" aria-label="Down">▼</button>
        <button class="dpad-btn" data-dir="ArrowRight" type="button" aria-label="Right">▶</button>
      </div>
    </div>

  </div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
