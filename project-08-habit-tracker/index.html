<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Build daily habits with current streak, best streak, and a 12-week completion heatmap." />
  <title>Habit Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>Habit Tracker</h1>
      <button id="theme-toggle" aria-label="Toggle theme">☀️</button>
    </header>

    <div class="add-row">
      <button id="add-btn">+ New Habit</button>
      <form id="add-form" hidden>
        <input
          id="habit-input"
          type="text"
          placeholder="e.g. Read for 20 minutes"
          maxlength="60"
          autocomplete="off"
        />
        <button type="submit">Add</button>
        <button type="button" id="cancel-btn">Cancel</button>
      </form>
    </div>

    <section id="habits-list" aria-label="Your habits"></section>

    <p id="empty-state" class="empty-state">
      No habits yet — hit <strong>+ New Habit</strong> to start.
    </p>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
