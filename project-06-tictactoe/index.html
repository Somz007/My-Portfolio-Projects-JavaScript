<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Tic-Tac-Toe with an unbeatable minimax AI, difficulty levels, score tracking, and themes." />
  <title>Tic-Tac-Toe — Project 06</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <header>
      <h1>Tic-Tac-Toe</h1>
      <button id="theme-toggle" type="button" aria-label="Toggle theme">☀︎</button>
    </header>

    <section class="controls" aria-label="Game settings">
      <div class="mode-picker" role="group" aria-label="Game mode">
        <button type="button" class="mode-btn active" data-mode="ai">vs AI</button>
        <button type="button" class="mode-btn"        data-mode="human">vs Human</button>
      </div>
      <div class="diff-picker" id="diff-picker" role="group" aria-label="Difficulty">
        <button type="button" class="diff-btn"        data-diff="easy">Easy</button>
        <button type="button" class="diff-btn"        data-diff="medium">Medium</button>
        <button type="button" class="diff-btn active" data-diff="hard">Hard</button>
      </div>
      <div class="side-picker" id="side-picker" role="group" aria-label="Choose your side">
        <span>Play as</span>
        <button type="button" class="side-btn active" data-side="X">X</button>
        <button type="button" class="side-btn"        data-side="O">O</button>
      </div>
    </section>

    <p class="status" id="status" role="status" aria-live="polite">Your turn</p>

    <div class="board" id="board" role="grid" aria-label="Game board"></div>

    <div class="scores" aria-label="Scoreboard">
      <div class="score-box">
        <span class="score-label" id="label-x">You</span>
        <span class="score-num"   id="score-x">0</span>
      </div>
      <div class="score-box draw">
        <span class="score-label">Draw</span>
        <span class="score-num" id="score-draws">0</span>
      </div>
      <div class="score-box">
        <span class="score-label" id="label-o">AI</span>
        <span class="score-num"   id="score-o">0</span>
      </div>
    </div>

    <div class="actions">
      <button type="button" class="btn-primary" id="new-game">New Game</button>
      <button type="button" class="btn-ghost"   id="reset-scores">Reset Scores</button>
    </div>

  </div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
