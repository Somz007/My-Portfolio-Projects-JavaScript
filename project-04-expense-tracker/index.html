<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="app">

      <!-- ── App header ──────────────────────────────────────── -->
      <header class="app-header">
        <div class="header-left">
          <h1 class="app-title">💰 Expenses</h1>
        </div>

        <!-- tab navigation -->
        <nav class="tab-nav" role="tablist" aria-label="App sections">
          <button class="tab-btn active" data-tab="overview"     role="tab">Overview</button>
          <button class="tab-btn"        data-tab="transactions" role="tab">Transactions</button>
          <button class="tab-btn"        data-tab="budget"       role="tab">Budget</button>
        </nav>

        <select class="currency-select" id="currency-select" aria-label="Currency"></select>
        <button class="add-btn" id="add-btn" type="button">+ Add Expense</button>
      </header>

      <!-- ── Tab panes ────────────────────────────────────────── -->
      <main class="app-main">

        <!-- overview -->
        <section class="tab-pane" id="tab-overview" role="tabpanel"></section>

        <!-- transactions -->
        <section class="tab-pane" id="tab-transactions" role="tabpanel" hidden></section>

        <!-- budget -->
        <section class="tab-pane" id="tab-budget" role="tabpanel" hidden></section>

      </main>
    </div>

    <!-- ── Add / Edit modal ─────────────────────────────────── -->
    <!--
      The modal wraps two parts:
        1. .modal-box  — the visible dialog
        2. clicking the backdrop (.modal-overlay) closes it
    -->
    <div class="modal-overlay" id="modal" hidden role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-box">
        <div class="modal-header">
          <h2 class="modal-title" id="modal-title">Add Expense</h2>
          <button class="modal-close" id="modal-close" type="button" aria-label="Close">×</button>
        </div>

        <!-- expense-form is the real <form> element that handles submit -->
        <form id="expense-form">
          <!-- populateForm() injects the fields here at runtime -->
          <div id="modal-form"></div>

          <div class="form-actions">
            <button type="button" class="btn-secondary" id="form-cancel">Cancel</button>
            <button type="submit" class="btn-primary"   id="form-submit">Add Expense</button>
          </div>
        </form>
      </div>
    </div>

    <!-- ── Undo delete toast ────────────────────────────────── -->
    <div class="toast" id="toast" hidden aria-live="assertive">
      <span id="toast-msg"></span>
      <button type="button" id="toast-undo" class="toast-undo">Undo</button>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
